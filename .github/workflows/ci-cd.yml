name: CI/CD DevOps Webinar

on:
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/setup-node@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test

      - name: Build Docker
        run: docker build -t webinar-devops .

      - name: Testar container
        run: docker run --rm webinar-devops npm test

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy no Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}